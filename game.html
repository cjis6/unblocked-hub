<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Loader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 10px 14px;
      background: #111;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    header button {
      background: #333;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    header button:hover {
      background: #444;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: black;
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <header>
    <span id="game-title">Loading…</span>
    <button onclick="window.location.href='index.html'">Back</button>
  </header>

  <!-- The game screen -->
  <iframe id="game-frame"></iframe>

  <!-- Load your config + card system -->
  <script src="assets/app.js"></script>

  <!-- Game loader logic -->
  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function loadGame() {
      const id = getParam("id");
      const config = window.__UNBLOCKED_CONFIG__;
      const game = config.games.find(g => g.id === id);

      const frame = document.getElementById("game-frame");
      const titleEl = document.getElementById("game-title");

      if (!game) {
        titleEl.textContent = "Game not found";
        return;
      }

      titleEl.textContent = game.name;

      // Load local file OR external URL
      if (game.localPath) {
        frame.src = game.localPath;
      } else {
        frame.src = game.externalUrl;
      }
    }

    document.addEventListener("DOMContentLoaded", loadGame);
  </script>

</body>
</html>
