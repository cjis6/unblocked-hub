<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading…</title>
  <link id="favicon" rel="icon" href="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#111; color:white; font-family:sans-serif; padding:20px;">

  <h2 id="proxy-title">Loading…</h2>
  <p>This page is now disguised.</p>
  <button onclick="window.location.href='index.html'">Back</button>

  <script src="assets/app.js"></script>

  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function loadProxy() {
      const id = getParam("id");
      const config = window.__UNBLOCKED_CONFIG__;
      const proxy = config.proxies.find(p => p.id === id);

      if (!proxy) return;

      // Change tab title
      document.title = proxy.title;

      // Change favicon
      document.getElementById("favicon").href = proxy.icon;

      // Change page text
      document.getElementById("proxy-title").textContent = proxy.name;
    }

    document.addEventListener("DOMContentLoaded", loadProxy);
  </script>

</body>
</html>
