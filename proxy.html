<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Proxy Loader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 10px 14px;
      background: #111;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    header button {
      background: #333;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    header button:hover {
      background: #444;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: black;
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <header>
    <span id="proxy-title">Loading…</span>
    <button onclick="window.location.href='index.html'">Back</button>
  </header>

  <!-- The proxy screen -->
  <iframe id="proxy-frame"></iframe>

  <!-- Load your config -->
  <script src="assets/app.js"></script>

  <!-- Proxy loader logic -->
  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function loadProxy() {
      const id = getParam("id");
      const config = window.__UNBLOCKED_CONFIG__;
      const proxy = config.proxies.find(p => p.id === id);

      const frame = document.getElementById("proxy-frame");
      const titleEl = document.getElementById("proxy-title");

      if (!proxy) {
        titleEl.textContent = "Proxy not found";
        return;
      }

      titleEl.textContent = proxy.name;
      frame.src = proxy.url;
    }

    document.addEventListener("DOMContentLoaded", loadProxy);
  </script>

</body>
</html>
