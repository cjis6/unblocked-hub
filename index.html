<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="icon" href="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body style="background:#111; color:white; font-family:sans-serif; margin:0;">

  <!-- HEADER -->
  <div style="padding:15px; background:#222; font-size:22px; font-weight:bold;">
    Home
  </div>

  <!-- CONTENT -->
  <div style="padding:20px;">

    <!-- GAMES SECTION -->
    <h2 style="margin-bottom:10px;">Games</h2>

    <input 
      id="game-search"
      type="text"
      placeholder="Search games..."
      style="
        width:100%;
        padding:10px;
        margin-bottom:15px;
        border-radius:8px;
        border:none;
        outline:none;
        font-size:16px;
      "
    >

    <div id="games-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
      gap:15px;
    "></div>

    <!-- PROXIES SECTION -->
    <h2 style="margin-top:30px; margin-bottom:10px;">Proxies</h2>
    <div id="proxy-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
      gap:15px;
    "></div>

  </div>

  <!-- MAIN SCRIPT -->
  <script src="assets/app.js"></script>

</body>
</html>
