<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="icon" href="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body style="background:#111; color:white; font-family:sans-serif; margin:0;">

  <!-- HEADER -->
  <div style="padding:15px; background:#222; font-size:22px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
    <span>Home</span>
    <button id="reset-cloak" style="
      background:#333;
      color:#fff;
      border:none;
      padding:6px 12px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    ">
      Reset Cloaker
    </button>
  </div>

  <!-- CONTENT -->
  <div style="padding:20px;">

    <!-- FAVORITES -->
    <h2>Favorites</h2>
    <div id="favorites-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
      gap:15px;
      margin-bottom:25px;
    "></div>

    <!-- RECENTLY PLAYED -->
    <h2>Recently Played</h2>
    <div id="recent-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
      gap:15px;
      margin-bottom:25px;
    "></div>

    <!-- GAMES -->
    <h2>Games</h2>

    <!-- CATEGORY FILTERS -->
    <div id="category-filters" style="margin-bottom:10px; display:flex; flex-wrap:wrap; gap:8px;">
      <button data-category="all" class="cat-btn" style="padding:6px 10px; border:none; border-radius:6px; cursor:pointer; background:#333; color:#fff;">All</button>
      <button data-category="action" class="cat-btn" style="padding:6px 10px; border:none; border-radius:6px; cursor:pointer; background:#222; color:#fff;">Action</button>
      <button data-category="sports" class="cat-btn" style="padding:6px 10px; border:none; border-radius:6px; cursor:pointer; background:#222; color:#fff;">Sports</button>
      <button data-category="arcade" class="cat-btn" style="padding:6px 10px; border:none; border-radius:6px; cursor:pointer; background:#222; color:#fff;">Arcade</button>
      <button data-category="runner" class="cat-btn" style="padding:6px 10px; border:none; border-radius:6px; cursor:pointer; background:#222; color:#fff;">Runner</button>
    </div>

    <!-- SEARCH -->
    <input 
      id="game-search"
      type="text"
      placeholder="Search games..."
      style="
        width:100%;
        padding:10px;
        margin-bottom:15px;
        border-radius:8px;
        border:none;
        outline:none;
        font-size:16px;
      "
    >

    <div id="games-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
      gap:15px;
    "></div>

    <!-- PROXIES -->
    <h2 style="margin-top:30px;">Proxies</h2>
    <div id="proxy-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
      gap:15px;
    "></div>

  </div>

  <script src="assets/app.js"></script>

</body>
</html>
