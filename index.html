<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="icon" href="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body style="background:#111; color:white; font-family:sans-serif; margin:0;">

  <div style="padding:15px; background:#222; font-size:22px; font-weight:bold;">
    Home
  </div>

  <div style="padding:20px;">
    <h2>Games</h2>
    <div id="games-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
      gap:15px;
    "></div>

    <h2 style="margin-top:30px;">Proxies</h2>
    <div id="proxy-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
      gap:15px;
    "></div>
  </div>

  <script src="assets/app.js"></script>

</body>
</html>
